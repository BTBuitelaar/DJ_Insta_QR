<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doric Jewelry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Georgia, serif;
    overflow:hidden;
}

.loading-container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
}

video{
    width:350px;
    height:auto;
    display:block;
    margin:0 auto 40px auto;
}

.loading-text{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:4px;
    font-size:26px;
    font-weight:600;
    color:#1a1a1a;
    letter-spacing:3px;
    text-transform:uppercase;
    line-height:1.2;
    animation:pulse 1.5s ease-in-out infinite;
}

.loading-text span{
    display:block;
}

.loading-dots{
    font-size:26px;
    font-weight:600;
    color:#1a1a1a;
    letter-spacing:3px;
    height:1.4em;
    animation:pulse 1.5s ease-in-out infinite;
}

.loading-dots::after{
    content:"";
    animation:dotContent 1.5s steps(4,end) infinite;
}

@keyframes dotContent{
    0%{content:"";}
    25%{content:".";}
    50%{content:"..";}
    75%{content:"...";}
    100%{content:"";}
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:.4;}
    100%{opacity:1;}
}
</style>
</head>

<body>

<div class="loading-container">

<video autoplay muted playsinline preload="auto" disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback">
    <source src="DJ_Logo_Vine_Video.mp4" type="video/mp4">
</video>

<div class="loading-text">
    <span>Loading</span>
    <span>Ancient Magic</span>
</div>

<div class="loading-dots"></div>

</div>

<script>
setTimeout(function(){
    window.location.href="https://www.instagram.com/doric_jewelry";
},5000);
</script>

</body>
</html>
