<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doric Jewelry</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Georgia,serif;
}

.loading-container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    transform:translateY(-40px);
}

video{
    width:350px;
    height:auto;
    display:block;
    margin:0 auto 40px;
    transform:translateX(7px);
}

.loading-text{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    font-size:26px;
    font-weight:600;
    letter-spacing:3px;
    text-transform:uppercase;
    line-height:1.2;
    color:#000000;
    animation:pulse 1.5s ease-in-out infinite;
}

.loading-dots{
    font-size:26px;
    font-weight:600;
    letter-spacing:3px;
    color:#000000;
    height:1.4em;
    margin-top:6px;
    animation:pulse 1.5s ease-in-out infinite;
}

.loading-dots::after{
    content:"";
    animation:dots 1.5s steps(4,end) infinite;
}

.tap-button{
    display:none;
    margin-top:40px;
    padding:14px 34px;
    border:1px solid #000;
    background:#fff;
    color:#000;
    font-family:Georgia,serif;
    font-size:16px;
    letter-spacing:2px;
    text-transform:uppercase;
    cursor:pointer;
    transition:.3s;
}

.tap-button:hover{
    background:#000;
    color:#fff;
}

.tap-button.show{
    display:block;
}

@keyframes dots{
    0%{content:"";}
    25%{content:".";}
    50%{content:"..";}
    75%{content:"...";}
    100%{content:"";}
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:.4;}
}
</style>
</head>

<body>

<div class="loading-container">

<video
id="introVideo"
muted
playsinline
webkit-playsinline
preload="auto"
autoplay>

<source src="DJ_Logo_Vine_Video.mp4" type="video/mp4">

</video>

<div class="loading-text">
<span>Loading</span>
<span>Ancient Magic</span>
</div>

<div class="loading-dots"></div>

<button class="tap-button" id="tapButton">
Tap to Enter
</button>

</div>

<script>

const video=document.getElementById("introVideo");
const button=document.getElementById("tapButton");

function redirect(){
    window.location.href="https://www.instagram.com/doric_jewelry";
}

video.play().then(()=>{

    video.onended=redirect;

}).catch(()=>{

    button.classList.add("show");

});

button.onclick=()=>{

    button.style.display="none";

    video.play();

    video.onended=redirect;

};

</script>

</body>
</html>
