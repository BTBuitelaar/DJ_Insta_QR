<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doric Jewelry</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Logo + sterren overlay wrapper */
    .logo-wrapper {
      position: relative;
      width: 175px;
      margin-bottom: 36px;
    }

    .logo {
      width: 175px;
      height: auto;
      display: block;
    }

    .stars-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 220px;
      height: auto;
      opacity: 1;
      filter: drop-shadow(0px 2px 6px rgba(180, 140, 60, 0.55));
      pointer-events: none;
    }

    /* Tekst blok met vaste hoogte zodat puntjes niet verspringen */
    .text-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .loading-text {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: pulse 1.5s ease-in-out infinite;
      line-height: 1.3;
    }

    .loading-dots {
      font-size: 26px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 3px;
      height: 1.4em;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .loading-dots::after {
      content: '';
      animation: dotContent 1.5s steps(4, end) infinite;
    }

    @keyframes dotContent {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }

    @keyframes pulse {
      0%   { opacity: 1; }
      50%  { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="logo-wrapper">
      <img src="logo.png" alt="Doric Jewelry Logo" class="logo">
      <img src="stars.gif" alt="Sterren" class="stars-overlay">
    </div>
    <div class="text-block">
      <p class="loading-text">Loading Ancient Magic</p>
      <p class="loading-dots"></p>
    </div>
  </div>

  <script>
    setTimeout(function() {
      window.location.href = 'https://www.instagram.com/doric_jewelry';
    }, 5000);
  </script>
</body>
</html>
